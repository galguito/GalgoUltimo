<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container border py-4 mt-3 mb-3 rounded">
        <h1 class="fw-bold text-center mt-3">
            Encontra tu proximo destino
        </h1>
        <p class="text-center">Reserva tu habitacion ideal al mejor precio</p>
        <div class="border-bottom border-top mt-3 d-flex justify-content-center align-items-center gap-4 py-3">
            <div>
                <label for="desitno" class="fw-bold form-label">
                    Destino
                </label>
                <select name="destino" id="destino" class="form-select">
                    <option value="" selected disabled>
                        Seleccione..
                    </option>
                    <option value="">
                        Barcelona
                    </option>
                    <option value="">
                        Madrid
                    </option>
                </select>
            </div>
            <div>
                <label for="fecha" class="form-label fw-bold">
                    Fecha de Entrada
                </label>
                <input type="date" class="form-control" id="fecha">
            </div>
            <div>
                <label for="salida" class="form-label fw-bold">
                    Fecha de Salida
                </label>
                <input type="date" class="form-control" id="salida">
            </div>
            <div>
                <button type="button" class="btn btn-primary">Buscar</button>
            </div>
        </div>
        <div class="row mt-3 g-3">
            <div class="col-6 col-lg-4">
                <div class="card">
                    <img src="./img/imagen-fondo1.jpg" class="card-img-top object-fit-cover" alt="playa"
                        style="height: 200px;">
                    <div class="card-body">
                        <h5 class="card-title">Habitacion Estandar</h5>
                        <p class="card-text">$60 /noche</p>
                        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
                            Reservar
                        </button>
                    </div>
                </div>
            </div>
            <div class="col-6 col-lg-4">
                <div class="card">
                    <img src="./img/imagen-fondo1.jpg" class="card-img-top object-fit-cover" alt="playa"
                        style="height: 200px;">
                    <div class="card-body">
                        <h5 class="card-title">Habitacion Estandar</h5>
                        <p class="card-text">$60 /noche</p>
                        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
                            Reservar
                        </button>
                    </div>
                </div>
            </div>
            <div class="col-6 col-lg-4">
                <div class="card">
                    <img src="./img/imagen-fondo1.jpg" class="card-img-top object-fit-cover" alt="playa"
                        style="height: 200px;">
                    <div class="card-body">
                        <h5 class="card-title">Habitacion Estandar</h5>
                        <p class="card-text">$60 /noche</p>
                        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
                            Reservar
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="exampleModalLabel">Reservar Habitacion</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
            <form action="" id="reserva">
                <div class="d-flex gap-3 mb-3">
                    <div>
                        <label for="nombre" class="form-label">
                            Nombre
                        </label>
                        <input type="text" name="nombre" id="nombre" class="form-control" required>
                    </div>
                    <div>
                        <label for="email" class="form-label">
                        Email
                        </label>
                        <input type="email" id="email" class="form-control">
                    </div>
                </div>
                <div class="d-flex gap-3">
                    <div>
                        <label for="fechini" class="form-label">
                            Fecha de Entrada
                        </label>
                        <input type="date" name="fecha" id="fechini" class="form-control" required>
                    </div>
                    <div>
                        <label for="sale" class="form-label">
                            Fecha de Salida
                        </label>
                        <input type="date" id="sale" class="form-control">
                    </div>
                </div>
            </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="submit" form="reserva"  class="btn btn-primary">Confirmar</button>
      </div>
    </div>
  </div>
</div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
